spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:h2:mem:erm;MODE=MYSQL;NON_KEYWORDS=USER"
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      show_sql: true;
      format_sql: true
      dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console